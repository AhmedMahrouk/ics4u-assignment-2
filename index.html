<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cubic Equation Solver</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./main.ts"></script>
</head>


  <body>
  <form id="solverForm">
    <label for="a">Value-A</label>
    <input type="number" id="a" required>

    <label for="b">Value-B</label>
    <input type="number" id="b" required>

    <label for="c">Value-C</label>
    <input type="number" id="c" required>

    <label for="d">Value-D</label>
    <input type="number" id="d" required>

    <button type="button">Solve</button>
  </form>
  <h2 id="equation"></h2>
  <div class="outputGroup">
    <label>Root-1</label>
    <input id="Value-1" readonly>

    <label>Root-2</label>
    <input id="Value-2" readonly>

    <label>Root-3</label>
    <input id="Value-3" readonly>

    <label>p</label>
    <input id="p" readonly>

    <label>q</label>
    <input id="q" readonly>

    <label>Discriminant</label>
    <input id="Disciminant" readonly>
  </div>
    <canvas id="graph" width="600" height="400"></canvas>
  </body>
</html>
